services:
  - type: web
    name: digitalmarketingdashboard
    env: node
    plan: free
    nodeVersion: 22.14.0
    buildCommand: |
      npm install
    startCommand: |
      npx next start -H 0.0.0.0 -p ${PORT:-10000}
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://analytics-2des.onrender.com
      - key: NEXT_PUBLIC_SITE_URL
        value: https://analytics-2des.onrender.com
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
